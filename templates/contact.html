<!DOCTYPE html>
<html>

<head>
     
    <title>MaduraiExploreX🚩 Contact Details</title>

    <link rel="icon" href="{{ url_for('static', filename='images/r.jpg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<header>

    <nav class="nav-bg">

        <a href="{{ url_for('home') }}">
            <h2>MaduraiExploreX🚩</h2>
        </a>

        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('places') }}">Places</a></li>
            <li><a href="{{ url_for('about') }}">About us</a></li>
            <li><a href="{{ url_for('contact') }}">Contact</a></li>
            <li><a href="{{ url_for('login') }}">Admin</a></li>
        </ul>

    </nav>

</header>


<!-- CONTACT FORM -->

<section class="forms">

    <h2>Get in Touch With ExploreX</h2>

    <section class="form">

        <form action="{{ url_for('submit') }}"
              method="POST">

            <div class="enquire-header">
                <h2>CONNECT WITH US</h2>
            </div>

            <input
                type="text"
                name="name"
                placeholder="Enter your name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <input
                type="text"
                name="place"
                placeholder="Enter your place"
                required
            >

            <select name="purpose" required>

                <option value="">Select Purpose</option>

                <option>Request Travel Help</option>

                <option>Suggest a Place</option>

                <option>Feedback</option>

                <option>General Query</option>

            </select>

            <textarea rows="6"
                name="message" 
                
                placeholder="Write your message here"
                required
               >
            </textarea>

            <button type="submit">
                SUBMIT
            </button>

        </form>

    </section>

</section>


<!-- FOOTER -->

<section class="shoes">

    <div class="shoe">
        <h6>Call Us</h6>
        <p>📞 +91 8148508006</p>
    </div>

    <div class="shoe">
        <h6>Email Us</h6>
        <p>📧 mail@explorex.in</p>
    </div>

</section>


<section class="finish">

    <div class="ends">

        <div class="end1">
            <p>Copyright © 2026 by ExploreX✈️. All Rights Reserved.</p>
        </div>

        <div class="end2">
            <p>Privacy Policy | Terms & Conditions</p>
        </div>

    </div>

</section>

</body>
</html>
